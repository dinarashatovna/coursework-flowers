services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: coursework-flowers:latest
    container_name: coursework-flowers
    ports:
      - "8007:8007"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8007
      ConnectionStrings__Default: "Data Source=/app/data/garden.db"
    volumes:
      - coursework-flowers-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8007/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  coursework-flowers-data: